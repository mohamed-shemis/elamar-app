<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0f172a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="ELAMAR"/>
<title>ELAMAR – برنامج إدارة المعدات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Cairo",sans-serif;background:#0f172a;color:#e2e8f0;min-height:100dvh;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:#1e293b;}::-webkit-scrollbar-thumb{background:#475569;border-radius:3px;}
input,select,textarea{font-family:"Cairo",sans-serif!important;}
#login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#0f172a,#1e293b);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
.login-box{background:#1e293b;border:1px solid #334155;border-radius:20px;padding:36px;width:100%;max-width:420px;}
.login-logo{width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 14px;}
#app-shell{display:none;flex-direction:column;min-height:100dvh;}
#topbar{background:#1e293b;border-bottom:1px solid #334155;padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:80;}
#bnav{position:fixed;bottom:0;left:0;right:0;background:#1e293b;border-top:1px solid #334155;display:flex;z-index:90;padding-bottom:env(safe-area-inset-bottom,0px);}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;padding:9px 4px 7px;cursor:pointer;border:none;background:transparent;}
.bni .bi{font-size:20px;}.bni .bl{font-family:"Cairo",sans-serif;font-size:10px;color:#64748b;margin-top:2px;font-weight:600;}
.bni.active .bl{color:#3b82f6;}
#content{flex:1;padding:16px;padding-bottom:72px;overflow-y:auto;}
#sidebar{display:none;}
@media(min-width:900px){
  #app-shell{flex-direction:row;height:100dvh;overflow:hidden;}
  #topbar{display:none;}#bnav{display:none!important;}
  #sidebar{display:flex;flex-direction:column;width:240px;background:#1e293b;border-left:1px solid #334155;flex-shrink:0;}
  #content{padding:28px 32px;overflow-y:auto;flex:1;}
}
.slogo{padding:20px;border-bottom:1px solid #334155;}
.slogo-icon{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:10px;}
.snav{display:flex;align-items:center;gap:11px;padding:11px 20px;cursor:pointer;border:none;background:transparent;width:100%;text-align:right;font-family:"Cairo",sans-serif;font-size:14px;font-weight:600;color:#94a3b8;transition:all .15s;}
.snav:hover{background:#0f172a;color:#e2e8f0;}
.snav.active{background:linear-gradient(90deg,#1e3a5f,rgba(30,58,95,0));color:#3b82f6;border-right:3px solid #3b82f6;}
.card{background:#1e293b;border:1px solid #334155;border-radius:16px;}
.btn{border:none;border-radius:10px;padding:10px 20px;font-family:"Cairo",sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:all .18s;}
.btn-blue{background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;}
.btn-blue:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(59,130,246,.4);}
.btn-red{background:linear-gradient(135deg,#ef4444,#b91c1c);color:#fff;}
.btn-green{background:linear-gradient(135deg,#22c55e,#15803d);color:#fff;}
.btn-ghost{background:transparent;color:#94a3b8;border:1px solid #334155;}
.btn-ghost:hover{background:#334155;}
.btn-sm{padding:7px 13px;font-size:12px;border-radius:8px;}
.field{background:#0f172a;border:1.5px solid #334155;border-radius:10px;padding:10px 13px;color:#e2e8f0;font-size:14px;width:100%;outline:none;transition:border .2s;}
.field:focus{border-color:#3b82f6;}.field option{background:#1e293b;}
label{display:block;font-size:12px;color:#94a3b8;margin-bottom:5px;font-weight:600;}
.badge{display:inline-block;font-size:11px;font-weight:700;border-radius:7px;padding:3px 9px;}
.bar-row{margin-bottom:11px;}
.bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;}
.bar-track{height:8px;background:#0f172a;border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .5s;}
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
@media(min-width:900px){.kgrid{grid-template-columns:repeat(4,1fr);gap:16px;}}
.rep2{display:grid;grid-template-columns:1fr;gap:16px;}
@media(min-width:900px){.rep2{grid-template-columns:1fr 1fr;}}
.tbl-wrap{display:none;overflow-x:auto;}
@media(min-width:900px){.tbl-wrap{display:block;}}
.dtbl{width:100%;border-collapse:collapse;font-size:13px;}
.dtbl th{padding:11px 13px;font-size:11px;font-weight:700;color:#64748b;text-align:right;white-space:nowrap;border-bottom:2px solid #334155;background:#0f172a;}
.dtbl td{padding:10px 13px;border-bottom:1px solid #1e293b;vertical-align:middle;}
.dtbl tr:hover td{background:rgba(59,130,246,.04);}
.rcards{display:block;}
@media(min-width:900px){.rcards{display:none;}}
.pager{display:flex;gap:5px;align-items:center;justify-content:center;padding:14px 0;flex-wrap:wrap;}
.pgbtn{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:6px 12px;color:#94a3b8;cursor:pointer;font-family:"Cairo",sans-serif;font-size:13px;font-weight:600;}
.pgbtn.cur{background:#3b82f6;border-color:#3b82f6;color:#fff;}
.pgbtn:disabled{opacity:.4;cursor:default;}
.fade{animation:fadeA .25s ease;}
@keyframes fadeA{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastA{from{transform:translateX(-50%) translateY(-14px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
#toast{display:none;position:fixed;top:68px;left:50%;transform:translateX(-50%);z-index:999;border-radius:12px;padding:10px 22px;font-size:14px;font-weight:700;box-shadow:0 6px 28px rgba(0,0,0,.5);white-space:nowrap;}
#modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:300;align-items:center;justify-content:center;padding:16px;}
.sync-bar{display:flex;align-items:center;gap:8px;padding:8px 16px;background:#0f172a;border-top:1px solid #334155;font-size:12px;color:#64748b;}
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.online{background:#22c55e;}.offline{background:#ef4444;}.syncing{background:#f59e0b;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>

<!-- LOGIN -->

    <div class="login-logo" style="background:linear-gradient(135deg,#1e3a5f,#0f172a);border:2px solid #e87722;font-size:11px;font-weight:900;color:#e87722;letter-spacing:1px;flex-direction:column;gap:2px;"><span style="font-size:13px;color:#1e3a8a;font-weight:900;">ELAMAR</span><span style="font-size:8px;color:#e87722;">المعدات</span></div>
    <h1 style="text-align:center;font-size:20px;font-weight:900;color:#f1f5f9;margin-bottom:4px;">متابعة المعدات</h1>

      <button class="btn btn-green" style="width:100%;padding:13px;" onclick="doRegister()">إنشاء الحساب</button>
      <button class="btn btn-ghost btn-sm" style="width:100%;margin-top:10px;" onclick="toggleForms('login')">← رجوع</button>
    </div>
  </div>
</div>

<!-- APP -->

      <div style="font-size:14px;font-weight:900;color:#f1f5f9;">متابعة المعدات</div>

<!-- EmailJS for Gmail notifications -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>
  // EmailJS Config - fill these after setup
  window._EMAILJS_SERVICE = 'YOUR_SERVICE_ID';
  window._EMAILJS_TEMPLATE = 'YOUR_TEMPLATE_ID'; 
  window._EMAILJS_KEY = 'YOUR_PUBLIC_KEY';
  window._ADMIN_EMAIL = 'mohamedshemis348@gmail.com';
</script>


<!-- Permissions System -->
<script>
// ── Role permissions matrix ──────────────────────────────
window._PERMS = {
  admin:  { canEdit:true,  canDelete:true,  canManageUsers:true,  seeMoney:true,  seeReports:true  },
  editor: { canEdit:true,  canDelete:false, canManageUsers:false, seeMoney:true,  seeReports:true  },
  viewer: { canEdit:false, canDelete:false, canManageUsers:false, seeMoney:false, seeReports:false },
};
// viewer sees 0 instead of — for numbers
window._role = 'viewer'; // default until login
window._can = function(perm) { 
  return window._PERMS[window._role] ? (window._PERMS[window._role][perm] || false) : false; 
};
</script>

<!-- FIREBASE SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, browserSessionPersistence, setPersistence } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, set, get, update, remove, onValue, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const fbApp = initializeApp({
  "apiKey": "AIzaSyA1gyFs8dvV2yTXzfns-vkAJTtxwq5pcyY",
  "authDomain": "elamar-equipment.firebaseapp.com",
  "databaseURL": "https://elamar-equipment-default-rtdb.firebaseio.com",
  "projectId": "elamar-equipment",
  "storageBucket": "elamar-equipment.firebasestorage.app",
  "messagingSenderId": "219130515363",
  "appId": "1:219130515363:web:f6bf5e4898e8d0a9791416"
});
const auth = getAuth(fbApp);
const db = getDatabase(fbApp);

// تسجيل خروج تلقائي عند إغلاق التطبيق
await setPersistence(auth, browserSessionPersistence);

window._fb = { auth, db, ref, set, get, update, remove, onValue, push, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut };

onAuthStateChanged(auth, async (user) => {
  if (user) {
    const snap = await get(ref(db, `users/${user.uid}`));
    const ud = snap.val() || {};
    window._cu = { uid: user.uid, email: user.email, ...ud };
    window._role = ud.role || 'viewer';
    const rl = { admin:'👑 مدير', editor:'✏️ محرر', viewer:'👁️ مشاهد' };
    const info = `${ud.name||user.email} · ${rl[ud.role]||''}`;
    document.getElementById('uinfo').textContent = info;
    document.getElementById('uinfo-m').textContent = info;
    if(ud.role==='admin'){
      document.getElementById('snav-u').style.display='flex';
    }
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app-shell').style.display='flex';
    loadFirebase();
    goto('d'); loadNotifications();
  } else {
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app-shell').style.display='none';
  }
});

function loadFirebase(){
  setSyncStatus('syncing','جاري التحميل...');
  onValue(ref(db,'records'),(snap)=>{
    const data=snap.val();
    if(data){
      window._recs=Object.entries(data).map(([k,v])=>({...v,_fbKey:k}));
    } else {
      uploadSeed();
    }
    setSyncStatus('online','متصل ومحدّث');
    if(window._pg) goto(window._pg);
  },(err)=>{
    setSyncStatus('offline','غير متصل');
    if(!window._recs||window._recs.length===0) window._recs=JSON.parse(JSON.stringify(window._SEED));
  });
}

async function uploadSeed(){
  const batch={};
  window._SEED.forEach((r,i)=>{ batch[`rec_${String(i+1).padStart(4,'0')}`]=r; });
  await set(ref(db,'records'),batch);
  toast('تم رفع البيانات ✓');
}

window._saveRec=async(rec)=>{
  if(rec._fbKey) await update(ref(db,`records/${rec._fbKey}`),rec);
  else { const nr=push(ref(db,'records')); rec._fbKey=nr.key; await set(nr,rec); }
};
window._delRec=async(k)=>await remove(ref(db,`records/${k}`));
window._saveUser=async(uid,d)=>await set(ref(db,`users/${uid}`),d);
window._getUsers=async()=>{ const s=await get(ref(db,'users')); return s.val()||{}; };
window._updRole=async(uid,role)=>await update(ref(db,`users/${uid}`),{role});
window._notif=async(msg)=>{ 
  // Save to Firebase
  const r=push(ref(db,'notifications')); 
  await set(r,{msg,time:new Date().toISOString(),read:false});
  // Send Gmail via EmailJS
  try {
    await fetch('https://api.emailjs.com/api/v1.0/email/send', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        service_id: window._EMAILJS_SERVICE,
        template_id: window._EMAILJS_TEMPLATE,
        user_id: window._EMAILJS_KEY,
        template_params: {
          to_email: window._ADMIN_EMAIL,
          message: msg,
          subject: '🔔 ELAMAR - مستخدم جديد',
          time: new Date().toLocaleString('ar-EG')
        }
      })
    });
  } catch(e) { console.log('Email notification error:', e); }
};

window.doLogin=async()=>{
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  const err=document.getElementById('login-err');
  err.style.display='none';
  try{ await signInWithEmailAndPassword(auth,email,pass); }
  catch(e){
    err.textContent=e.code==='auth/invalid-credential'?'البريد أو كلمة المرور غلط':
      e.code==='auth/too-many-requests'?'محاولات كثيرة، انتظر':e.message;
    err.style.display='block';
  }
};

window.doRegister=async()=>{
  const name=document.getElementById('reg-name').value.trim();
  const email=document.getElementById('reg-email').value.trim();
  const pass=document.getElementById('reg-pass').value;
  const phone=document.getElementById('reg-phone').value.trim();
  const err=document.getElementById('reg-err');
  const ok=document.getElementById('reg-ok');
  err.style.display='none'; ok.style.display='none';
  if(!name||!email||!pass){ err.textContent='ادخل كل البيانات'; err.style.display='block'; return; }
  if(pass.length<6){ err.textContent='كلمة المرور 6 أحرف على الأقل'; err.style.display='block'; return; }
  try{
    const cred=await createUserWithEmailAndPassword(auth,email,pass);
    await window._saveUser(cred.user.uid,{name,email,phone,role:'viewer',createdAt:new Date().toISOString()});
    await window._notif(`👤 مستخدم جديد: ${name} | ${email} | ${phone}`);

async function syncToSheets(){
  const token = await getAccessToken();
  if(!token){ toast('تعذر الاتصال بـ Google Sheets','err'); return; }
  
  setSyncDots('syncing','جاري المزامنة...');
  
  // Prepare rows
  const rows = [HEADERS]; // header row
  window._recs.forEach(r=>{
    rows.push(HEADERS.map(h=>r[h]||''));
  });
  
  try{
    // Clear then write
    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Sheet1!A1:Z10000:clear`,{
      method:'POST', headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'}
    });
    
    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Sheet1!A1?valueInputOption=RAW`,{
      method:'PUT',
      headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},
      body: JSON.stringify({values:rows})
    });
    
    setSyncDots('online','تمت المزامنة مع الشيت ✓');
    toast('تمت المزامنة مع Google Sheets ✓');
  } catch(e){
    setSyncDots('offline','خطأ في المزامنة');
    toast('خطأ في المزامنة','err');
  }
}

      headers:{'Authorization':`Bearer ${token}
    });
    const data = await res.json();
    const rows = data.values||[];
    if(rows.length<2){ toast('الشيت فاضي أو فيه هيدر بس'); return; }
    const headers = rows[0];
    const recs = rows.slice(1).map((row,i)=>{
      const obj={_fbKey:null};

function setSyncDots(s,t){

window.syncSheets=async()=>{
  const action = await showSyncMenu();
  if(action==='to') await syncToSheets();
  else if(action==='from') await syncFromSheets();
};

function showSyncMenu(){
  return new Promise(resolve=>{
    const div=document.createElement('div');
    div.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;';
    div.innerHTML=`<div class="card" style="padding:24px;max-width:340px;width:100%;text-align:center;">
      <div style="font-size:28px;margin-bottom:12px;">🔄</div>
      <div style="font-weight:900;font-size:16px;color:#f1f5f9;margin-bottom:18px;">مزامنة Google Sheets</div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <button class="btn btn-blue" onclick="this.closest('div[style]').resolve('to')">⬆️ رفع للشيت (البرنامج → الشيت)</button>
        <button class="btn btn-green" onclick="this.closest('div[style]').resolve('from')">⬇️ جلب من الشيت (الشيت → البرنامج)</button>
        <button class="btn btn-ghost" onclick="this.closest('div[style]').resolve(null)">إلغاء</button>
      </div>
    </div>`;
    div._resolve=resolve;
    div.querySelectorAll('button').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const action=btn.textContent.includes('رفع')?'to':btn.textContent.includes('جلب')?'from':null;
        document.body.removeChild(div); resolve(action);
      });
    });
    document.body.appendChild(div);
  });
}

      <div><label>المورد</label><input class="field" id="fsup" list="supl" value="${v.supplier||''}" ${ro}/><datalist id="supl">${SUPS.map(s=>`<option value="${s}"></option>`).join('')}</datalist></div>
      <div><label>من عهدة</label><input class="field" id="fcust" value="${v.custodian||''}" ${ro}/></div>
      <div><label>الاعتماد</label><input class="field" id="fapp" value="${v.approval||''}" ${ro}/></div>
    </div>
  </div>
  <div style="display:flex;gap:10px;">
    <button class="btn btn-ghost" style="flex:1;padding:13px;" onclick="goto('l')">رجوع</button>
    ${canE?`<button class="btn btn-blue" style="flex:2;padding:13px;font-size:15px;" onclick="saveRec()">${editId?'💾 حفظ التعديلات':'✅ حفظ السجل'}</button>`:''}
  </div>
</div></div>`;
}
function autoN(){const c=document.getElementById('fc')?.value?.trim(),n=document.getElementById('fn');if(c&&EQ_MAP[c]&&n&&!n.value)n.value=EQ_MAP[c];}
function ct(){const q=parseFloat(document.getElementById('fq2')?.value||0),p=parseFloat(document.getElementById('fp')?.value||0),td=document.getElementById('td');if(td)td.textContent=window._can('seeMoney')?fmt(q*p)+' ج.م':'0 ج.م';}

async function saveRec(){
  if(!canEdit()){toast('ليس لديك صلاحية','err');return;}
  const code=(document.getElementById('fc')?.value||'').trim();
  const name=(document.getElementById('fn')?.value||'').trim();
  if(!code||!name){toast('كود المعدة واسمها مطلوبان','err');return;}
  const qty=parseFloat(document.getElementById('fq2')?.value||0);
  const price=parseFloat(document.getElementById('fp')?.value||0);
  const existing=editId?window._recs.find(r=>r.id===editId):null;
  const rec={
    id:editId||(++nid), _fbKey:existing?._fbKey||null,
    equipmentCode:code, equipmentName:name,
    description:(document.getElementById('fd')?.value||'').trim(),
    unit:document.getElementById('fu')?.value||'عدد',
    qty, unitPrice:price, total:qty*price,
    expenseType:document.getElementById('fe2')?.value||'',
    status:document.getElementById('fst')?.value||'',
    location:document.getElementById('flo')?.value||'',
    date:document.getElementById('fdate')?.value||'',
    invoiceNo:(document.getElementById('fi')?.value||'').trim(),
    supplier:(document.getElementById('fsup')?.value||'').trim(),
    custodian:(document.getElementById('fcust')?.value||'').trim(),
    approval:(document.getElementById('fapp')?.value||'').trim(),
    updatedBy:window._cu?.email||'',
    updatedAt:new Date().toISOString(),
  };
  if(editId){window._recs=window._recs.map(r=>r.id===editId?rec:r);toast('تم التحديث ✓');}
  else{window._recs.push(rec);if(code)EQ_MAP[code]=name;toast('تمت الإضافة ✓');}
  if(window._saveRec) await window._saveRec(rec);
  // Auto sync to sheets
  syncToSheets();
  goto('l');
}

// ══ REPORTS ══════════════════════════════════════════════
function renderR(){
  const recs=window._recs;
  const total=recs.reduce((s,r)=>s+Number(r.total||0),0);
  const byExp=getByExp(),byEq=getByEq(),bySup=getBySup();
  const maxE=byExp[0]?.v||1,maxQ=byEq[0]?.v||1;
  const bySt=STATUSES.map(s=>({s,n:recs.filter(r=>r.status===s).length}));
  const M=window._can('seeMoney');
  const $ = (v,unit='ج.م') => M ? fmt(v)+(unit?' '+unit:'') : '0 '+unit;

  document.getElementById('pg-r').innerHTML=`<div class="fade">
  <div style="margin-bottom:18px;">
    <h2 style="font-size:20px;font-weight:900;color:#f1f5f9;">التقارير</h2>
    <p style="color:#64748b;font-size:12px;">${recs.length.toLocaleString()} سجل</p>
  </div>

  <div class="kgrid" style="margin-bottom:16px;">${[
    {l:'إجمالي الإنفاق',    v:$(total),                                              c:'#3b82f6'},
    {l:'متوسط الفاتورة',    v:$(Math.round(total/Math.max(recs.length,1))),          c:'#f59e0b'},
    {l:'أعلى قيمة فاتورة',  v:$(Math.max(...recs.map(r=>Number(r.total||0)))),      c:'#ef4444'},
    {l:'عدد الموردين',       v:new Set(recs.map(r=>r.supplier).filter(Boolean)).size, c:'#22c55e'},
  ].map(k=>`<div class="card" style="padding:14px;">
    <div style="font-size:11px;color:#64748b;margin-bottom:3px;">${k.l}</div>
    <div style="font-size:16px;font-weight:900;color:${k.c};">${k.v}</div>
  </div>`).join('')}</div>

  <div class="rep2">
    <div class="card" style="padding:18px;">
      <div style="font-size:14px;font-weight:900;color:#f1f5f9;margin-bottom:14px;">💸 الإنفاق حسب المصروف</div>
      ${byExp.map(e=>`<div class="bar-row">
        <div class="bar-label">
          <span style="color:#e2e8f0;font-weight:600;">${e.t}</span>
          <span style="color:#3b82f6;font-weight:800;">${$(e.v)}</span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(e.v/maxE*100)}%;background:linear-gradient(90deg,#3b82f6,#6366f1);"></div></div>
      </div>`).join('')}
    </div>

    <div class="card" style="padding:18px;">
      <div style="font-size:14px;font-weight:900;color:#f1f5f9;margin-bottom:14px;">🔵 توزيع الحالات</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">${bySt.map(x=>`
        <div style="background:#0f172a;border-radius:12px;padding:14px;border:1px solid ${(STATUS_COLOR[x.s]||'#94a3b8')}44;text-align:center;">
          <div style="font-size:26px;font-weight:900;color:${STATUS_COLOR[x.s]||'#94a3b8'};">${x.n}</div>
          <div style="font-size:11px;color:#94a3b8;margin-top:2px;">${x.s}</div>
          <div style="font-size:10px;color:#64748b;">${recs.length>0?Math.round(x.n/recs.length*100):0}%</div>
        </div>`).join('')}
      </div>
    </div>

    <div class="card" style="padding:18px;">
      <div style="font-size:14px;font-weight:900;color:#f1f5f9;margin-bottom:14px;">⚙️ أعلى المعدات (15)</div>
      ${byEq.slice(0,15).map(e=>`<div class="bar-row">
        <div class="bar-label">
          <span style="color:#e2e8f0;font-weight:600;max-width:60%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${e.n}</span>
          <span style="color:#22c55e;font-weight:800;">${$(e.v)}</span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(e.v/maxQ*100)}%;background:linear-gradient(90deg,#22c55e,#16a34a);"></div></div>
      </div>`).join('')}
    </div>

    <div class="card" style="padding:18px;">
      <div style="font-size:14px;font-weight:900;color:#f1f5f9;margin-bottom:14px;">🏪 أعلى الموردين</div>
      ${bySup.slice(0,10).map((e,i)=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #1e293b;">
          <div style="display:flex;align-items:center;gap:9px;">
            <span style="width:22px;height:22px;border-radius:50%;background:#334155;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#94a3b8;">${i+1}</span>
            <span style="font-size:13px;color:#e2e8f0;font-weight:600;">${e.s}</span>
          </div>
          <span style="font-size:13px;color:#f59e0b;font-weight:800;">${$(e.v)}</span>
        </div>`).join('')}
    </div>
  </div>
</div>`;
}

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { getDatabase, ref, set, get, update, remove, onValue, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const fbApp = initializeApp({
  "apiKey": "AIzaSyA1gyFs8dvV2yTXzfns-vkAJTtxwq5pcyY",
  "authDomain": "elamar-equipment.firebaseapp.com",
  "databaseURL": "https://elamar-equipment-default-rtdb.firebaseio.com",
  "projectId": "elamar-equipment",
  "storageBucket": "elamar-equipment.firebasestorage.app",
  "messagingSenderId": "219130515363",
  "appId": "1:219130515363:web:f6bf5e4898e8d0a9791416"
});
const auth = getAuth(fbApp);
const db = getDatabase(fbApp);

// تسجيل خروج تلقائي عند إغلاق التطبيق
await setPersistence(auth, browserSessionPersistence);

window._fb = { auth, db, ref, set, get, update, remove, onValue, push, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut };

onAuthStateChanged(auth, async (user) => {
  if (user) {
    const snap = await get(ref(db, `users/${user.uid}`));
    const ud = snap.val() || {};
    window._cu = { uid: user.uid, email: user.email, ...ud };
    window._role = ud.role || 'viewer';
    const rl = { admin:'👑 مدير', editor:'✏️ محرر', viewer:'👁️ مشاهد' };
    const info = `${ud.name||user.email} · ${rl[ud.role]||''}`;
    document.getElementById('uinfo').textContent = info;
    document.getElementById('uinfo-m').textContent = info;
    if(ud.role==='admin'){
      document.getElementById('snav-u').style.display='flex';
    }
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app-shell').style.display='flex';
    loadFirebase();
    goto('d'); loadNotifications();
  } else {
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app-shell').style.display='none';
  }
});

function loadFirebase(){
  setSyncStatus('syncing','جاري التحميل...');
  onValue(ref(db,'records'),(snap)=>{
    const data=snap.val();
    if(data){
      window._recs=Object.entries(data).map(([k,v])=>({...v,_fbKey:k}));
    } else {
      uploadSeed();
    }
    setSyncStatus('online','متصل ومحدّث');
    if(window._pg) goto(window._pg);
  },(err)=>{
    setSyncStatus('offline','غير متصل');
    if(!window._recs||window._recs.length===0) window._recs=JSON.parse(JSON.stringify(window._SEED));
  });
}

async function uploadSeed(){
  const batch={};
  window._SEED.forEach((r,i)=>{ batch[`rec_${String(i+1).padStart(4,'0')}`]=r; });
  await set(ref(db,'records'),batch);
  toast('تم رفع البيانات ✓');
}

window._saveRec=async(rec)=>{
  if(rec._fbKey) await update(ref(db,`records/${rec._fbKey}`),rec);
  else { const nr=push(ref(db,'records')); rec._fbKey=nr.key; await set(nr,rec); }
};
window._delRec=async(k)=>await remove(ref(db,`records/${k}`));
window._saveUser=async(uid,d)=>await set(ref(db,`users/${uid}`),d);
window._getUsers=async()=>{ const s=await get(ref(db,'users')); return s.val()||{}; };
window._updRole=async(uid,role)=>await update(ref(db,`users/${uid}`),{role});
window._notif=async(msg)=>{ 
  // Save to Firebase
  const r=push(ref(db,'notifications')); 
  await set(r,{msg,time:new Date().toISOString(),read:false});
  // Send Gmail via EmailJS
  try {
    await fetch('https://api.emailjs.com/api/v1.0/email/send', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        service_id: window._EMAILJS_SERVICE,
        template_id: window._EMAILJS_TEMPLATE,
        user_id: window._EMAILJS_KEY,
        template_params: {
          to_email: window._ADMIN_EMAIL,
          message: msg,
          subject: '🔔 ELAMAR - مستخدم جديد',
          time: new Date().toLocaleString('ar-EG')
        }
      })
    });
  } catch(e) { console.log('Email notification error:', e); }
};

window.doLogin=async()=>{
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  const err=document.getElementById('login-err');
  err.style.display='none';
  try{ await signInWithEmailAndPassword(auth,email,pass); }
  catch(e){
    err.textContent=e.code==='auth/invalid-credential'?'البريد أو كلمة المرور غلط':
      e.code==='auth/too-many-requests'?'محاولات كثيرة، انتظر':e.message;
    err.style.display='block';
  }
};

window.doRegister=async()=>{
  const name=document.getElementById('reg-name').value.trim();
  const email=document.getElementById('reg-email').value.trim();
  const pass=document.getElementById('reg-pass').value;
  const phone=document.getElementById('reg-phone').value.trim();
  const err=document.getElementById('reg-err');
  const ok=document.getElementById('reg-ok');
  err.style.display='none'; ok.style.display='none';
  if(!name||!email||!pass){ err.textContent='ادخل كل البيانات'; err.style.display='block'; return; }
  if(pass.length<6){ err.textContent='كلمة المرور 6 أحرف على الأقل'; err.style.display='block'; return; }
  try{
    const cred=await createUserWithEmailAndPassword(auth,email,pass);
    await window._saveUser(cred.user.uid,{name,email,phone,role:'viewer',createdAt:new Date().toISOString()});
    await window._notif(`👤 مستخدم جديد: ${name} | ${email} | ${phone}`);
    ok.textContent='تم إنشاء الحساب! في انتظار تفعيل الصلاحيات.';
    ok.style.display='block';
  } catch(e){
    err.textContent=e.code==='auth/email-already-in-use'?'البريد مستخدم بالفعل':e.message;
    err.style.display='block';
  }
};

window.doLogout=async()=>await signOut(auth);

function setSyncStatus(s,t){
  const cls={online:'online',offline:'offline',syncing:'syncing'};
  ['sdot','sdot-m'].forEach(id=>{const el=document.getElementById(id);if(el){el.className='sync-dot';el.classList.add(cls[s]);}});
  const st=document.getElementById('stxt'); if(st) st.textContent=t;
}
</script>

async function syncToSheets(){
  const token = await getAccessToken();
  if(!token){ toast('تعذر الاتصال بـ Google Sheets','err'); return; }
  
  setSyncDots('syncing','جاري المزامنة...');
  
  // Prepare rows
  const rows = [HEADERS]; // header row
  window._recs.forEach(r=>{
    rows.push(HEADERS.map(h=>r[h]||''));
  });
  
  try{
    // Clear then write
    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Sheet1!A1:Z10000:clear`,{
      method:'POST', headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'}
    });
    
    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Sheet1!A1?valueInputOption=RAW`,{
      method:'PUT',
      headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},
      body: JSON.stringify({values:rows})
    });
    
    setSyncDots('online','تمت المزامنة مع الشيت ✓');
    toast('تمت المزامنة مع Google Sheets ✓');
  } catch(e){
    setSyncDots('offline','خطأ في المزامنة');
    toast('خطأ في المزامنة','err');
  }
}

async function syncFromSheets(){
  const token = await getAccessToken();
  if(!token){ toast('تعذر الاتصال','err'); return; }
  setSyncDots('syncing','جاري الاستيراد...');
  try{
    const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Sheet1!A1:Z10000`,{
      headers:{'Authorization':`Bearer ${token}
    });
    const data = await res.json();
    const rows = data.values||[];
    if(rows.length<2){ toast('الشيت فاضي أو فيه هيدر بس'); return; }
    const headers = rows[0];
    const recs = rows.slice(1).map((row,i)=>{
      const obj={_fbKey:null};
      headers.forEach((h,j)=>{ obj[h]=row[j]||''; });
      obj.id = obj.id||i+1;
      obj.qty = parseFloat(obj.qty)||0;
      obj.unitPrice = parseFloat(obj.unitPrice)||0;
      obj.total = parseFloat(obj.total)||0;
      return obj;
    });
    window._recs = recs;
    setSyncDots('online','تم الاستيراد من الشيت ✓');
    toast(`تم استيراد ${recs.length} سجل من Google Sheets ✓`);
    goto(pg);
  } catch(e){
    setSyncDots('offline','خطأ في الاستيراد');
    toast('خطأ في الاستيراد','err');
  }
}

    </div>
  </div>
  <div id="ulist" style="color:#64748b;text-align:center;padding:20px;">جاري التحميل...</div>
  </div>`;
  
  const users = await window._getUsers();
  const roleLabel = {admin:'👑 مدير',editor:'✏️ محرر',viewer:'👁️ مشاهد'};
  const roleColor = {admin:'#f59e0b',editor:'#3b82f6',viewer:'#94a3b8'};
  const roleBg = {admin:'#78350f',editor:'#1e3a5f',viewer:'#1e293b'};
  const entries = Object.entries(users);
  
  if(entries.length === 0){
    document.getElementById('ulist').innerHTML = '<div style="color:#64748b;text-align:center;padding:40px;">لا يوجد مستخدمين بعد</div>';
    return;
  }
  
  document.getElementById('ulist').innerHTML = entries.map(([uid,u])=>`
    <div class="card" style="padding:18px;margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;">
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
            <div style="width:36px;height:36px;border-radius:50%;background:${roleBg[u.role]||'#1e293b'};border:2px solid ${roleColor[u.role]||'#334155'};display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">
              ${u.role==='admin'?'👑':u.role==='editor'?'✏️':'👁️'}
            </div>
            <div>
              <div style="font-weight:800;color:#f1f5f9;font-size:14px;">${u.name||'—'}</div>
              <div style="font-size:11px;color:#64748b;">${u.email||''}</div>
            </div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;">
            ${u.phone?`<span style="font-size:11px;background:#1e293b;border:1px solid #334155;border-radius:6px;padding:2px 8px;color:#94a3b8;">📱 ${u.phone}</span>`:''}
            <span style="font-size:11px;background:#1e293b;border:1px solid #334155;border-radius:6px;padding:2px 8px;color:#64748b;">📅 ${(u.createdAt||'').slice(0,10)}</span>
            <span style="font-size:11px;font-weight:700;background:${roleBg[u.role]};color:${roleColor[u.role]};border-radius:6px;padding:2px 8px;">${roleLabel[u.role]||u.role}</span>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;min-width:180px;">
          <label style="font-size:11px;color:#64748b;margin-bottom:0;">تغيير الصلاحية:</label>
          <select class="field" style="font-size:13px;" onchange="changeRole('${uid}',this.value,'${u.name||u.email}')">
            <option value="viewer" ${u.role==='viewer'?'selected':''}>👁️ مشاهد — بيانات بدون أرقام</option>
            <option value="editor" ${u.role==='editor'?'selected':''}>✏️ محرر — إضافة وتعديل</option>
            <option value="admin"  ${u.role==='admin'?'selected':''}>👑 مدير — صلاحيات كاملة</option>
          </select>
          ${uid !== window._cu?.uid ? `
          <button onclick="confirmDeleteUser('${uid}','${u.name||u.email}')" 
            style="background:#7f1d1d;border:none;border-radius:8px;padding:7px;color:#ef4444;cursor:pointer;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;">
            🗑 حذف المستخدم
          </button>` : '<div style="font-size:11px;color:#475569;text-align:center;">حسابك الحالي</div>'}
        </div>
      </div>
    </div>`).join('');
}

async function changeRole(uid, role, name){
  await window._updRole(uid, role);
  const roleLabel = {admin:'مدير 👑',editor:'محرر ✏️',viewer:'مشاهد 👁️'};
  toast(`تم تغيير صلاحية ${name} إلى ${roleLabel[role]} ✓`);
  setTimeout(()=>renderU(), 500);
}

function confirmDeleteUser(uid, name){
  if(!confirm(`هل تريد حذف المستخدم "${name}" نهائياً؟`)) return;
  deleteUserRecord(uid, name);
}

async function deleteUserRecord(uid, name){
  try{
    await window._fb.remove(window._fb.ref(window._fb.db, `users/${uid}`));
    toast(`تم حذف المستخدم ${name} ✓`);
    renderU();
  }catch(e){
    toast('خطأ في الحذف','err');
  }
}


</script>
</body>
</html>
