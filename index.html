<head>

<link rel="apple-touch-icon" sizes="152x152" href="icon-152.png"/>
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png"/>
<link rel="apple-touch-icon" sizes="167x167" href="icon-192.png"/>

<!-- Favicon -->
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--ff);background:#0f172a;color:#e2e8f0;min-height:100dvh;}
:root{--ff:'Cairo',sans-serif;}
body.en{--ff:'Inter',sans-serif;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:#1e293b;}::-webkit-scrollbar-thumb{background:#475569;border-radius:3px;}
input,select,textarea{font-family:var(--ff)!important;}
/* LOGIN */
#login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#0f172a,#1e293b);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
.lbox{background:#1e293b;border:1px solid #334155;border-radius:20px;padding:36px;width:100%;max-width:420px;}
.logo-wrap{width:72px;height:72px;border-radius:18px;background:linear-gradient(135deg,#1e3a5f,#0f172a);border:2px solid #e87722;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 16px;gap:1px;}
.logo-wrap .lg1{font-size:16px;font-weight:900;color:#1e3a8a;letter-spacing:1px;}
.logo-wrap .lg2{font-size:9px;font-weight:700;color:#e87722;}
/* APP */
#app{display:none;flex-direction:column;min-height:100dvh;}
#topbar{background:#1e293b;border-bottom:1px solid #334155;padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:80;flex-shrink:0;}
#bnav{position:fixed;bottom:0;left:0;right:0;background:#1e293b;border-top:1px solid #334155;display:flex;z-index:90;padding-bottom:env(safe-area-inset-bottom,0px);}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;padding:9px 4px 7px;cursor:pointer;border:none;background:transparent;}
.bni .bi{font-size:20px;line-height:1;}.bni .bl{font-family:var(--ff);font-size:10px;color:#64748b;margin-top:2px;font-weight:600;}
.bni.active .bl{color:#3b82f6;}
#content{flex:1;padding:16px;padding-bottom:72px;overflow-y:auto;}
#sidebar{display:none;}
@media(min-width:900px){
  #app{flex-direction:row;height:100dvh;overflow:hidden;}
  #topbar{display:none;}#bnav{display:none!important;}
  #sidebar{display:flex;flex-direction:column;width:240px;background:#1e293b;border-left:1px solid #334155;flex-shrink:0;}
  body.en #sidebar{border-left:none;border-right:1px solid #334155;}
  #content{padding:24px 28px;overflow-y:auto;flex:1;}
}
.slogo{padding:16px 20px;border-bottom:1px solid #334155;display:flex;align-items:center;gap:10px;}
.slogo-icon{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#1e3a5f,#0f172a);border:1.5px solid #e87722;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;flex-shrink:0;}
.snav{display:flex;align-items:center;gap:11px;padding:11px 20px;cursor:pointer;border:none;background:transparent;width:100%;text-align:right;font-family:var(--ff);font-size:14px;font-weight:600;color:#94a3b8;transition:all .15s;}
body.en .snav{text-align:left;}
.snav:hover{background:#0f172a;color:#e2e8f0;}
.snav.active{background:linear-gradient(90deg,#1e3a5f,rgba(30,58,95,0));color:#3b82f6;border-right:3px solid #3b82f6;}
body.en .snav.active{border-right:none;border-left:3px solid #3b82f6;background:linear-gradient(270deg,#1e3a5f,rgba(30,58,95,0));}
/* LANG BTN */
.lang-btn{background:linear-gradient(135deg,#1e3a5f,#334155);border:1px solid #3b82f6;border-radius:8px;padding:5px 12px;color:#60a5fa;cursor:pointer;font-family:var(--ff);font-size:12px;font-weight:700;transition:all .2s;}
.lang-btn:hover{background:#3b82f6;color:#fff;}
/* COMMON */
.card{background:#1e293b;border:1px solid #334155;border-radius:16px;}
.btn{border:none;border-radius:10px;padding:10px 20px;font-family:var(--ff);font-weight:700;font-size:14px;cursor:pointer;transition:all .18s;}
.btn-blue{background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;}
.btn-blue:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(59,130,246,.4);}
.btn-red{background:linear-gradient(135deg,#ef4444,#b91c1c);color:#fff;}
.btn-green{background:linear-gradient(135deg,#22c55e,#15803d);color:#fff;}
.btn-ghost{background:transparent;color:#94a3b8;border:1px solid #334155;}
.btn-ghost:hover{background:#334155;color:#e2e8f0;}
.btn-sm{padding:7px 13px;font-size:12px;border-radius:8px;}
.field{background:#0f172a;border:1.5px solid #334155;border-radius:10px;padding:10px 13px;color:#e2e8f0;font-size:14px;width:100%;outline:none;transition:border .2s;}
.field:focus{border-color:#3b82f6;}.field option{background:#1e293b;}
label{display:block;font-size:12px;color:#94a3b8;margin-bottom:5px;font-weight:600;}
.badge{display:inline-block;font-size:11px;font-weight:700;border-radius:7px;padding:3px 9px;}
.bar-row{margin-bottom:11px;}
.bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;}
.bar-track{height:8px;background:#0f172a;border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .5s;}
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
@media(min-width:900px){.kgrid{grid-template-columns:repeat(4,1fr);gap:16px;}}
.rep2{display:grid;grid-template-columns:1fr;gap:16px;}
@media(min-width:900px){.rep2{grid-template-columns:1fr 1fr;}}
.tbl-wrap{display:none;overflow-x:auto;}
@media(min-width:900px){.tbl-wrap{display:block;}}
.dtbl{width:100%;border-collapse:collapse;font-size:13px;}
.dtbl th{padding:11px 13px;font-size:11px;font-weight:700;color:#64748b;text-align:right;white-space:nowrap;border-bottom:2px solid #334155;background:#0f172a;}
body.en .dtbl th{text-align:left;}
.dtbl td{padding:10px 13px;border-bottom:1px solid #1e293b;vertical-align:middle;}
.dtbl tr:hover td{background:rgba(59,130,246,.04);}
.rcards{display:block;}
@media(min-width:900px){.rcards{display:none;}}
.pager{display:flex;gap:5px;align-items:center;justify-content:center;padding:14px 0;flex-wrap:wrap;}
.pgbtn{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:6px 12px;color:#94a3b8;cursor:pointer;font-family:var(--ff);font-size:13px;font-weight:600;}
.pgbtn.cur{background:#3b82f6;border-color:#3b82f6;color:#fff;}
.pgbtn:disabled{opacity:.4;cursor:default;}
.fade{animation:fadeA .3s ease;}
@keyframes fadeA{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{transform:translateX(-50%) translateY(-16px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
#toast{display:none;position:fixed;top:68px;left:50%;transform:translateX(-50%);z-index:999;border-radius:12px;padding:11px 22px;font-size:14px;font-weight:700;box-shadow:0 6px 28px rgba(0,0,0,.5);white-space:nowrap;animation:toastIn .3s ease;}
#modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:300;align-items:center;justify-content:center;padding:16px;}
.sdot{width:8px;height:8px;border-radius:50%;display:inline-block;}
.s-on{background:#22c55e;}.s-off{background:#ef4444;}.s-sync{background:#f59e0b;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.nbadge{position:absolute;top:-5px;right:-5px;background:#ef4444;color:#fff;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;}
body.en .nbadge{right:auto;left:-5px;}

/* ── PWA Install Banner ── */
#pwa-banner{
  display:none;position:fixed;bottom:76px;left:0;right:0;
  margin:0 12px;z-index:250;
  background:linear-gradient(135deg,#1e3a5f,#1e293b);
  border:1px solid #3b82f6;border-radius:16px;
  padding:14px 16px;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
  animation:slideUp .4s cubic-bezier(.34,1.56,.64,1);
}
@media(min-width:900px){#pwa-banner{bottom:20px;max-width:380px;left:50%;right:auto;transform:translateX(-50%);}}
@keyframes slideUp{from{transform:translateY(100px);opacity:0}to{transform:translateY(0);opacity:1}}
@media(min-width:900px){@keyframes slideUp{from{transform:translateX(-50%) translateY(40px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}}
.pwa-row{display:flex;align-items:center;gap:12px;}
.pwa-icon{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#1e3a5f,#0f172a);border:1.5px solid #e87722;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;}
.pwa-txt{flex:1;}
.pwa-title{font-weight:800;color:#f1f5f9;font-size:14px;}
.pwa-sub{color:#94a3b8;font-size:11px;margin-top:2px;line-height:1.4;}
.pwa-btns{display:flex;gap:8px;margin-top:12px;}
.pwa-btn-install{flex:1;background:linear-gradient(135deg,#3b82f6,#1d4ed8);border:none;border-radius:10px;padding:10px;color:#fff;font-weight:700;font-size:14px;cursor:pointer;font-family:var(--ff);}
.pwa-btn-later{background:transparent;border:1px solid #334155;border-radius:10px;padding:10px 16px;color:#94a3b8;font-weight:600;font-size:13px;cursor:pointer;font-family:var(--ff);}
.pwa-close{position:absolute;top:10px;right:10px;background:none;border:none;color:#64748b;cursor:pointer;font-size:18px;padding:4px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="lbox">
    <div class="logo-wrap"><span class="lg1">ELAMAR</span><span class="lg2" id="lg2-txt">المعدات</span></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <div><h1 id="login-h1" style="font-size:18px;font-weight:900;color:#f1f5f9;">برنامج إدارة المعدات</h1><p id="login-p" style="color:#64748b;font-size:12px;margin-top:2px;">موقع بيلاميرا</p></div>
      <button class="lang-btn" onclick="toggleLang()" id="lang-btn-login">EN</button>
    </div>

    <div id="form-login">
      <div style="margin-bottom:12px;"><label id="lbl-email">البريد الإلكتروني</label><input class="field" id="l-email" type="email" placeholder="example@gmail.com" dir="ltr" onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <div style="margin-bottom:18px;"><label id="lbl-pass">كلمة المرور</label><input class="field" id="l-pass" type="password" placeholder="••••••••" dir="ltr" onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <div id="l-err" style="color:#ef4444;font-size:13px;margin-bottom:10px;display:none;text-align:center;"></div>
      <button class="btn btn-blue" id="btn-login" style="width:100%;padding:13px;font-size:15px;" onclick="doLogin()">تسجيل الدخول</button>
      <div style="text-align:center;margin-top:14px;padding-top:14px;border-top:1px solid #334155;">
        <button class="btn btn-ghost btn-sm" id="btn-to-reg" style="width:100%;" onclick="switchForm('reg')">إنشاء حساب جديد</button>
      </div>
    </div>

    <div id="form-reg" style="display:none;">
      <div style="margin-bottom:11px;"><label id="lbl-name">الاسم الكامل *</label><input class="field" id="r-name" placeholder="محمد أحمد"/></div>
      <div style="margin-bottom:11px;"><label id="lbl-remail">البريد الإلكتروني *</label><input class="field" id="r-email" type="email" dir="ltr"/></div>
      <div style="margin-bottom:11px;"><label id="lbl-rpass">كلمة المرور * (6+)</label><input class="field" id="r-pass" type="password" dir="ltr"/></div>
      <div style="margin-bottom:16px;"><label id="lbl-phone">رقم الواتساب</label><input class="field" id="r-phone" type="tel" dir="ltr" placeholder="01xxxxxxxxx"/></div>
      <div id="r-err" style="color:#ef4444;font-size:13px;margin-bottom:10px;display:none;text-align:center;"></div>
      <div id="r-ok" style="color:#22c55e;font-size:13px;margin-bottom:10px;display:none;text-align:center;"></div>
      <button class="btn btn-green" id="btn-register" style="width:100%;padding:13px;" onclick="doRegister()">إنشاء الحساب</button>
      <button class="btn btn-ghost btn-sm" id="btn-back-login" style="width:100%;margin-top:10px;" onclick="switchForm('login')">← رجوع</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <nav id="sidebar">
    <div class="slogo">
      <div class="slogo-icon"><span style="font-size:10px;font-weight:900;color:#1e3a8a;">EL</span><span style="font-size:7px;font-weight:700;color:#e87722;">AMAR</span></div>
      <div style="flex:1;"><div id="s-title" style="font-size:13px;font-weight:900;color:#f1f5f9;">إدارة المعدات</div><div id="s-site" style="font-size:11px;color:#64748b;">بيلاميرا</div></div>
      <button class="lang-btn" onclick="toggleLang()" id="lang-btn-app">EN</button>
    </div>
    <div style="padding:8px 0;flex:1;overflow-y:auto;">
      <button class="snav active" id="snav-d" onclick="goto('d')"><span style="font-size:17px;">🏠</span><span id="sn-d">لوحة المتابعة</span></button>
      <button class="snav" id="snav-l" onclick="goto('l')"><span style="font-size:17px;">📋</span><span id="sn-l">السجلات</span></button>
      <button class="snav" id="snav-f" onclick="newForm()"><span style="font-size:17px;">➕</span><span id="sn-f">إضافة سجل</span></button>
      <button class="snav" id="snav-r" onclick="goto('r')"><span style="font-size:17px;">📊</span><span id="sn-r">التقارير</span></button>
      <button class="snav" id="snav-u" onclick="goto('u')" style="display:none;"><span style="font-size:17px;">👥</span><span id="sn-u">المستخدمين</span></button>
    </div>
    <div style="padding:10px 20px;border-top:1px solid #334155;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <span id="sdot" class="sdot s-on"></span>
        <span id="stxt" style="font-size:11px;color:#64748b;">متصل</span>
        <button id="notif-btn" onclick="showNotif()" style="display:none;position:relative;background:none;border:none;cursor:pointer;font-size:18px;margin-right:auto;">🔔<span id="nbadge" class="nbadge" style="display:none;">0</span></button>
      </div>
      <div id="uinfo" style="font-size:11px;color:#64748b;margin-bottom:8px;"></div>
      <button class="btn btn-ghost btn-sm" id="btn-logout" style="width:100%;" onclick="doLogout()">تسجيل الخروج</button>
    </div>
  </nav>

  <div id="topbar">
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="slogo-icon" style="width:34px;height:34px;border-radius:9px;"><span style="font-size:9px;font-weight:900;color:#1e3a8a;">EL</span><span style="font-size:6px;font-weight:700;color:#e87722;">AMAR</span></div>
      <div><div id="ptitle" style="font-weight:900;font-size:14px;color:#f1f5f9;">لوحة المتابعة</div><div id="uinfo-m" style="font-size:10px;color:#64748b;"></div></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span id="sdot-m" class="sdot s-on"></span>
      <button class="lang-btn" onclick="toggleLang()" id="lang-btn-top" style="padding:4px 10px;font-size:11px;">EN</button>
      <button onclick="doLogout()" style="background:none;border:none;color:#94a3b8;cursor:pointer;font-size:20px;">⏻</button>
    </div>
  </div>

  <main id="content">
    <div id="toast"></div>
    <div id="modal-ov">
      <div class="card" style="max-width:360px;width:100%;padding:28px;text-align:center;">
        <div style="font-size:44px;margin-bottom:12px;">🗑️</div>
        <div id="del-title" style="font-weight:900;font-size:17px;color:#f1f5f9;margin-bottom:8px;">تأكيد الحذف</div>
        <div id="del-body" style="color:#94a3b8;font-size:13px;margin-bottom:22px;">هل تريد حذف هذا السجل؟</div>
        <div style="display:flex;gap:10px;justify-content:center;">
          <button class="btn btn-red" id="btn-del-ok" onclick="doDelete()">احذف</button>
          <button class="btn btn-ghost" id="btn-del-cancel" onclick="closeModal()">إلغاء</button>
        </div>
      </div>
    </div>
    <div id="pg-d" class="fade"></div>
    <div id="pg-l" style="display:none;"></div>
    <div id="pg-f" style="display:none;"></div>
    <div id="pg-r" style="display:none;"></div>
    <div id="pg-u" style="display:none;"></div>
  </main>

  <nav id="bnav">
    <button class="bni active" id="bnav-d" onclick="goto('d')"><span class="bi">🏠</span><span class="bl" id="bn-d">الرئيسية</span></button>
    <button class="bni" id="bnav-l" onclick="goto('l')"><span class="bi">📋</span><span class="bl" id="bn-l">السجلات</span></button>
    <button class="bni" onclick="newForm()" style="flex:1.2;">
      <div style="width:46px;height:46px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:-18px;box-shadow:0 4px 14px rgba(59,130,246,.5);"><span style="font-size:22px;">➕</span></div>
      <span class="bl" id="bn-f">إضافة</span>
    </button>
    <button class="bni" id="bnav-r" onclick="goto('r')"><span class="bi">📊</span><span class="bl" id="bn-r">تقارير</span></button>
    <button class="bni" onclick="goto('l');setTimeout(()=>document.getElementById('srch')?.focus(),150)"><span class="bi">🔍</span><span class="bl" id="bn-s">بحث</span></button>
  </nav>
</div>

<!-- PERMISSIONS -->
<script>
window._PERMS = {
  admin:  {canEdit:true, canDelete:true, canManageUsers:true, seeMoney:true, canSync:true},
  editor: {canEdit:true, canDelete:false,canManageUsers:false,seeMoney:true, canSync:false},
  viewer: {canEdit:false,canDelete:false,canManageUsers:false,seeMoney:false,canSync:false},
};
window._role = 'viewer';
window._can  = p => !!(window._PERMS[window._role]?.[p]);
window._m    = (v,u='ج.م') => window._can('seeMoney') ? (isNaN(v)?v:Number(v).toLocaleString('ar-EG'))+(u?' '+u:'') : '0'+(u?' '+u:'');
</script>

window._lang = localStorage.getItem('elamar_lang')||'ar';

function T(k){ return TR[window._lang]?.[k] || TR.ar[k] || k; }

function applyLang(){
  const en = window._lang==='en';
  document.documentElement.dir  = en?'ltr':'rtl';
  document.documentElement.lang = en?'en':'ar';
  document.body.classList.toggle('en',en);

  const el = id => document.getElementById(id);
  const set = (id,v) => { const e=el(id); if(e) e.textContent=v; };

  // Login
  set('lg2-txt',    T('appTitle').split(' ')[0]);
  set('login-h1',   T('loginTitle'));
  set('login-p',    T('loginSite'));
  set('lbl-email',  T('emailLbl'));
  set('lbl-pass',   T('passLbl'));
  set('btn-login',  T('loginBtn'));
  set('btn-to-reg', T('toReg'));
  set('lbl-name',   T('nameLbl'));
  set('lbl-remail', T('remail'));
  set('lbl-rpass',  T('rpass'));
  set('lbl-phone',  T('phoneLbl'));
  set('btn-register',T('regBtn'));
  set('btn-back-login',T('backLogin'));
  ['lang-btn-login','lang-btn-app','lang-btn-top'].forEach(id=>set(id,T('langBtn')));

  // App
  set('s-title',  T('appTitle'));
  set('s-site',   T('appSite'));
  set('btn-logout',T('logout'));
  set('stxt',     T('connected'));

  // Nav
  set('sn-d',T('navDash')); set('sn-l',T('navRecs')); set('sn-f',T('navAdd'));
  set('sn-r',T('navRep')); set('sn-u',T('navUsers'));
  set('bn-d',T('bnDash')); set('bn-l',T('bnRecs')); set('bn-f',T('bnAdd'));
  set('bn-r',T('bnRep')); set('bn-s',T('bnSearch'));

  // Modal
  set('del-title',  T('delTitle'));
  set('del-body',   T('delBody'));
  set('btn-del-ok', T('delOk'));
  set('btn-del-cancel',T('delCancel'));

  // Update active page title
  const pg = ['d','l','f','r','u'].find(p=>el('pg-'+p)?.style.display!=='none');
  if(pg){
    const titleMap={d:'navDash',l:'navRecs',f:editId?'editTitle':'addTitle',r:'repTitle',u:'usersTitle'};
    set('ptitle',T(titleMap[pg]||'navDash'));
  }
}

function toggleLang(){
  window._lang = window._lang==='ar'?'en':'ar';
  localStorage.setItem('elamar_lang',window._lang);
  applyLang();
  // Re-render current page
  const pg = ['d','l','f','r','u'].find(p=>document.getElementById('pg-'+p)?.style.display!=='none');
  if(pg==='d') renderD();
  else if(pg==='l') renderL();
  else if(pg==='f') renderF(editId?window._recs.find(r=>r.id===editId):null);
  else if(pg==='r') renderR();
  else if(pg==='u') renderU();
}

applyLang();
</script>

function loadData(){
  setSS('s-sync');
  onValue(ref(db,'records'),snap=>{
    const d=snap.val();
    if(d){window._recs=Object.entries(d).map(([k,v])=>({...v,_fbKey:k}));}
    else{uploadSeed();}
    setSS('s-on');
    if(window._pg){goto(window._pg);window._pg=null;}
  },()=>{
    setSS('s-off');
    if(!window._recs?.length)window._recs=JSON.parse(JSON.stringify(window._SEED));
    if(window._pg){goto(window._pg);window._pg=null;}
  });
}

async function uploadSeed(){
  const b={};window._SEED.forEach((r,i)=>{b[`rec_${String(i+1).padStart(4,'0')}`]=r;});
  await set(ref(db,'records'),b);
  toast('✓');
}

window._saveFB=async r=>{if(r._fbKey)await update(ref(db,`records/${r._fbKey}`),r);else{const n=push(ref(db,'records'));r._fbKey=n.key;await set(n,r);}};
window._delFB=async k=>await remove(ref(db,`records/${k}`));
window._saveUser=async(uid,d)=>await set(ref(db,`users/${uid}`),d);

window._delUser=async uid=>await remove(ref(db,`users/${uid}`));

window._sendNotif=async msg=>{
  const r=push(ref(db,'notifications'));
  await set(r,{msg,time:new Date().toISOString(),read:false});

};

function loadNotifs(){
  if(!window._can('canManageUsers'))return;
  onValue(ref(db,'notifications'),snap=>{
    const d=snap.val()||{};
    window._notifs=d;
    const u=Object.values(d).filter(n=>!n.read).length;
    const nb=document.getElementById('nbadge');
    if(nb){nb.textContent=u;nb.style.display=u>0?'flex':'none';}

  const email=document.getElementById('l-email').value.trim();
  const pass=document.getElementById('l-pass').value;
  const err=document.getElementById('l-err');
  err.style.display='none';
  if(!email||!pass){err.textContent=window._lang==='en'?'Enter email and password':'ادخل البريد وكلمة المرور';err.style.display='block';return;}
  try{await signInWithEmailAndPassword(auth,email,pass);}
  catch(e){
    err.textContent=e.code==='auth/invalid-credential'?(window._lang==='en'?'Wrong email or password':'البريد أو كلمة المرور غلط'):e.message;

  }

window.doRegister=async()=>{

  const pass=document.getElementById('r-pass').value;
  const phone=document.getElementById('r-phone').value.trim();

  if(pass.length<6){err.textContent=window._lang==='en'?'Password min 6 chars':'كلمة المرور 6 أحرف+';err.style.display='block';return;}

    const c=await createUserWithEmailAndPassword(auth,email,pass);

    await signOut(auth);
    setTimeout(()=>switchForm('login'),3000);
  }catch(e){
    err.textContent=e.code==='auth/email-already-in-use'?(window._lang==='en'?'Email already used':'البريد مستخدم بالفعل'):e.message;
    err.style.display='block';
  }
};

    let res = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${SID}/values/${sheetName}!A1:Z5000`,
      {headers:{Authorization:`Bearer ${token}`}}
    );
    let d = await res.json();

    // If failed, try first sheet (index)
    if(!d.values || d.values.length < 2){
      res = await fetch(
        `https://sheets.googleapis.com/v4/spreadsheets/${SID}/values/A1:Z5000`,
        {headers:{Authorization:`Bearer ${token}`}}
      );
      d = await res.json();
    }

    const rows = d.values||[];
    if(rows.length < 2){
      const errMsg = d.error ? `خطأ: ${d.error.message}` : (window._lang==='en'?'Sheet is empty or cannot be read':'الشيت فاضي أو لا يمكن قراءته');
      toast(errMsg,'err');
      setSS('s-off');
      return;
    }

    const hdrs = rows[0];
    window._recs = rows.slice(1).filter(row=>row.some(c=>c)).map((row,i)=>{
      const o={_fbKey:null};
      hdrs.forEach((h,j)=>{
        const key = AR_MAP[h] || h;
        o[key] = row[j]||'';
      });
      o.id = o.id || i+1;
      o.qty = parseFloat(o.qty)||0;
      o.unitPrice = parseFloat(o.unitPrice)||0;
      o.total = parseFloat(o.total)||0;
      if(!o.status) o.status='جاهزة للعمل';
      if(!o.expenseType) o.expenseType='أخرى';
      return o;
    });

    setSS('s-on');
    toast(`${window._recs.length} ${window._lang==='en'?'records imported ✓':'سجل تم استيراده ✓'}`);
    goto(window._pg||'d');
  }catch(e){
    console.error('Sync error:',e);
    setSS('s-off');
    toast((window._lang==='en'?'Import error: ':'خطأ: ')+e.message,'err');
  }
};

function setSS(cls){
  ['sdot','sdot-m'].forEach(id=>{const e=document.getElementById(id);if(e){e.className='sdot';e.classList.add(cls);}});
  const st=document.getElementById('stxt');
  if(st)st.textContent={s_on:T('connected'),s_off:T('offline'),s_sync:T('loading')}[cls.replace('-','_')]||T('connected');
}
</script>

const EXP=['شراء','صيانة','صيانة دورية','صيانة طارئة','قطع غيار','وقود','زيوت وشحوم','مصنعية','تشغيل','تجهيز','نقل','ايجار','أخرى'];
const LOCS=['بيلاميرا','مخزن العام','شورز','ورشة'];
const UNITS=['عدد','مجموعه','لتر','متر','كيلو','كجم','ساعه','طن','زيارة'];
let nid=9999,editId=null,delId=null,delKey=null;
let sv='',fs='الكل',fe='الكل',fq='الكل',pn=1;
const PS=30;
const fmt=n=>Number(n||0).toLocaleString('ar-EG');
const bdg=s=>`<span class="badge" style="background:${SB2(s)};color:${SC2(s)};">${s||''}</span>`;
let _tt;
function toast(m,t='ok'){
  const e=document.getElementById('toast');
  e.textContent=m;e.style.background=t==='ok'?'#14532d':'#7f1d1d';
  e.style.border=`1px solid ${t==='ok'?'#22c55e':'#ef4444'}`;
  e.style.color=t==='ok'?'#86efac':'#fca5a5';
  e.style.display='block';clearTimeout(_tt);_tt=setTimeout(()=>e.style.display='none',3000);
}
function closeModal(){document.getElementById('modal-ov').style.display='none';}
function confirmDel(id,key){delId=id;delKey=key;document.getElementById('modal-ov').style.display='flex';}
async function doDelete(){
  if(!window._can('canDelete')){toast(T('noPermDelete')||'No permission','err');closeModal();return;}
  window._recs=window._recs.filter(r=>r.id!==delId);
  if(delKey&&window._delFB)await window._delFB(delKey);
  closeModal();toast(window._lang==='en'?'Deleted':'تم الحذف','err');
  renderL();
  if(window._can('canSync'))window.syncToSheets();
}
function switchForm(f){
  document.getElementById('form-login').style.display=f==='login'?'block':'none';
  document.getElementById('form-reg').style.display=f==='reg'?'block':'none';
}
const PGKEYS={d:'navDash',l:'navRecs',f:'addTitle',r:'repTitle',u:'usersTitle'};
function goto(p){
  ['d','l','f','r','u'].forEach(x=>{const e=document.getElementById('pg-'+x);if(e)e.style.display=x===p?'block':'none';});
  ['d','l','r'].forEach(x=>{document.getElementById('bnav-'+x)?.classList.toggle('active',x===p);document.getElementById('snav-'+x)?.classList.toggle('active',x===p);});
  document.getElementById('snav-f')?.classList.remove('active');
  const pt=document.getElementById('ptitle');if(pt)pt.textContent=T(PGKEYS[p]||'navDash');
  if(p==='d')renderD();if(p==='l'){pn=1;renderL();}if(p==='r')renderR();if(p==='u')renderU();
  window.scrollTo(0,0);
}
function newForm(){if(!window._can('canEdit')){toast(window._lang==='en'?'No permission':'ليس لديك صلاحية','err');return;}editId=null;goto('f');renderF(null);}
function editForm(id){editId=id;goto('f');renderF(window._recs.find(r=>r.id===id));}
// helpers
function getByEq(){const m=new Map();window._recs.forEach(r=>{const k=r.equipmentCode||'?';const c=m.get(k)||{k,n:r.equipmentName||k,v:0};c.v+=Number(r.total||0);m.set(k,c);});return[...m.values()].sort((a,b)=>b.v-a.v);}
function getByExp(){const m=new Map();window._recs.forEach(r=>{const t=r.expenseType||'أخرى';m.set(t,(m.get(t)||0)+Number(r.total||0));});return[...m.entries()].map(([t,v])=>({t,v})).sort((a,b)=>b.v-a.v);}
function getBySup(){const m=new Map();window._recs.forEach(r=>{if(r.supplier)m.set(r.supplier,(m.get(r.supplier)||0)+Number(r.total||0));});return[...m.entries()].map(([s,v])=>({s,v})).sort((a,b)=>b.v-a.v);}

    <div class="card" style="padding:18px;">

      ${byExp.slice(0,6).map(e=>`<div class="bar-row"><div class="bar-label"><span style="color:#e2e8f0;font-weight:600;">${e.t}</span><span style="color:#3b82f6;font-weight:800;">${window._m(e.v)}</span></div><div class="bar-track"><div class="bar-fill" style="width:${byExp[0]?.v?Math.round(e.v/byExp[0].v*100):0}%;background:linear-gradient(90deg,#3b82f6,#6366f1);"></div></div></div>`).join('')}

// LIST
function getFilt(){return window._recs.filter(r=>{const q=sv.trim().toLowerCase();if(q&&!([r.equipmentCode,r.equipmentName,r.description,r.supplier,r.invoiceNo].join(' ').toLowerCase().includes(q)))return false;if(fs!=='الكل'&&r.status!==fs)return false;if(fe!=='الكل'&&r.expenseType!==fe)return false;if(fq!=='الكل'&&r.equipmentCode!==fq)return false;return true;});}

    </div>
  </div>
  <div class="rcards">
    ${page.map(r=>`<div class="card" onclick="editForm(${r.id})" style="padding:14px;margin-bottom:9px;cursor:pointer;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
        <div style="flex:1;min-width:0;"><div style="font-weight:800;color:#f1f5f9;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${r.equipmentName||''}</div><div style="font-size:11px;color:#3b82f6;font-weight:600;">${r.equipmentCode||''}</div></div>

</div>`;

<!-- ═══════════ PWA LOGIC ═══════════ -->
<script>
'use strict';

// ── متغيرات PWA ──────────────────────────────────────────────
let _deferredPrompt = null;   // حدث تثبيت Android Chrome
let _pwaShown = false;        // هل تم عرض البانر؟

// ── تسجيل Service Worker ─────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js', { scope: './' })
      .then(reg => {
        console.log('✅ SW registered');
        // تحقق من تحديثات
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              // يوجد تحديث - يمكن إشعار المستخدم
              console.log('🔄 Update available');
            }
          });
        });
      })
      .catch(err => console.log('SW error:', err));
  });
}

// ── Android Chrome: اعتراض حدث التثبيت ──────────────────────
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredPrompt = e;
  
  // عرض البانر بعد 4 ثواني إذا لم يُرفض من قبل
  if (!localStorage.getItem('pwa_dismissed') && !_pwaShown) {
    setTimeout(showPWABanner, 4000);
  }
});

// ── عرض بانر التثبيت ─────────────────────────────────────────
function showPWABanner() {
  if (_pwaShown) return;
  
  const isEn = window._lang === 'en';
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isInStandalone = window.matchMedia('(display-mode: standalone)').matches 
                      || window.navigator.standalone;
  
  // لا تعرض البانر إذا كان التطبيق مثبّتاً بالفعل
  if (isInStandalone) return;
  
  const banner = document.getElementById('pwa-banner');
  const title  = document.getElementById('pwa-title');
  const sub    = document.getElementById('pwa-sub');
  const btn    = document.getElementById('pwa-install-btn');
  const later  = document.getElementById('pwa-later-btn');
  
  if (isIOS) {
    // تعليمات خاصة بـ iPhone/iPad (Safari لا يدعم beforeinstallprompt)
    if (title) title.textContent = isEn ? 'Install ELAMAR on iPhone/iPad' : 'ثبّت ELAMAR على iPhone/iPad';
    if (sub) sub.innerHTML = isEn
      ? '📱 Tap <strong>Share</strong> <span style="font-size:16px;">⎙</span> then <strong>"Add to Home Screen"</strong>'
      : '📱 اضغط <strong>مشاركة</strong> <span style="font-size:16px;">⎙</span> ثم <strong>"إضافة للشاشة الرئيسية"</strong>';
    if (btn) { 
      document.getElementById('pwa-install-txt').textContent = isEn ? 'Got it ✓' : 'فهمت ✓';
      btn.onclick = dismissPWA;
    }
  } else {
    // Android / Desktop
    if (title) title.textContent = isEn ? 'Install ELAMAR App' : 'ثبّت تطبيق ELAMAR';
    if (sub) sub.textContent = isEn 
      ? 'Works offline as a real native app' 
      : 'يعمل بدون إنترنت كتطبيق حقيقي على هاتفك';
  }
  
  if (later) later.textContent = isEn ? 'Later' : 'لاحقاً';
  if (banner) banner.style.display = 'block';
  _pwaShown = true;
}

// ── تثبيت التطبيق (Android Chrome) ──────────────────────────
async function installPWA() {
  const banner = document.getElementById('pwa-banner');
  
  if (_deferredPrompt) {
    // عرض حوار التثبيت الرسمي من Android
    _deferredPrompt.prompt();
    const { outcome } = await _deferredPrompt.userChoice;
    console.log('PWA install outcome:', outcome);
    _deferredPrompt = null;
  }
  
  dismissPWA();
}

// ── رفض عرض التثبيت ─────────────────────────────────────────
function dismissPWA() {
  const banner = document.getElementById('pwa-banner');
  if (banner) {
    banner.style.animation = 'none';
    banner.style.transition = 'opacity .3s, transform .3s';
    banner.style.opacity = '0';
    banner.style.transform = 'translateY(20px)';
    setTimeout(() => banner.style.display = 'none', 300);
  }
  localStorage.setItem('pwa_dismissed', Date.now().toString());
}

// ── تطبيق مثبّت بالفعل ──────────────────────────────────────
window.addEventListener('appinstalled', () => {
  const banner = document.getElementById('pwa-banner');
  if (banner) banner.style.display = 'none';
  _deferredPrompt = null;
  console.log('✅ PWA installed!');
  // مبروك! يمكن عرض رسالة
  setTimeout(() => {
    if (typeof toast === 'function') {
      toast(window._lang === 'en' ? '🎉 App installed successfully!' : '🎉 تم تثبيت التطبيق بنجاح!');
    }
  }, 1000);
});

// ── إظهار البانر عند تغيير اللغة ────────────────────────────
const _origToggleLang = window.toggleLang;
if (typeof _origToggleLang === 'function') {
  window.toggleLang = function() {
    _origToggleLang();
    // تحديث نص البانر إذا كان مرئياً
    const banner = document.getElementById('pwa-banner');
    if (banner && banner.style.display !== 'none') {
      _pwaShown = false;
      showPWABanner();
    }
  };
}

// ── إعادة ضبط رفض التثبيت بعد 7 أيام ────────────────────────
const dismissed = localStorage.getItem('pwa_dismissed');
if (dismissed) {
  const daysSince = (Date.now() - parseInt(dismissed)) / (1000 * 60 * 60 * 24);
  if (daysSince > 7) {
    localStorage.removeItem('pwa_dismissed');
  }
}
</script>
