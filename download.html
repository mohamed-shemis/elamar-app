<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ELAMAR ERP Download</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
body{font-family:Cairo,sans-serif;background:linear-gradient(135deg,#1565c0,#42a5f5);display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}
.card{background:#fff;border-radius:18px;padding:35px;max-width:520px;width:92%;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,.25)}
img{width:110px}
.version{display:inline-block;background:#4caf50;color:#fff;padding:8px 18px;border-radius:20px;margin:15px 0}
.download{display:block;background:#1565c0;color:#fff;text-decoration:none;padding:16px;border-radius:10px;font-size:22px;font-weight:bold}
.download:hover{background:#0d47a1}
.small{color:#666;margin-top:18px}
</style>
</head>
<body>
<div class="card">
<img src="icon-512.png" alt="logo">
<h1>ELAMAR ERP</h1>
<div class="version" id="ver">Loading...</div>
<p>منصة إدارة المعدات لشركة العمار.</p>
<a id="downloadBtn" class="download" href="#">⬇ تحميل أحدث إصدار</a>
<p class="small" id="date"></p>
</div>
<script>
(async()=>{
 const btn=document.getElementById('downloadBtn');
 try{
  const r=await fetch('https://api.github.com/repos/mohamed-shemis/elamar-app/releases/latest');
  if(!r.ok) throw new Error();
  const rel=await r.json();
  document.getElementById('ver').textContent=rel.tag_name;
  document.getElementById('date').textContent='آخر تحديث: '+new Date(rel.published_at).toLocaleDateString('ar-EG');
  const exe=rel.assets.find(a=>a.name.toLowerCase().endsWith('.exe'));
  if(exe){
    btn.onclick=(e)=>{e.preventDefault();location.href=exe.browser_download_url;}
  }else{
    btn.textContent='لا يوجد ملف EXE في آخر إصدار';
  }
 }catch(e){
   document.getElementById('ver').textContent='Connection Error';
   btn.textContent='تعذر جلب أحدث إصدار';
 }
})();
</script>
</body>
</html>
