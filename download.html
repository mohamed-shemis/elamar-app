<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELAMAR ERP | Download</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
body{background:linear-gradient(135deg,#0d47a1,#1565c0,#1e88e5);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.card{background:#fff;max-width:520px;width:100%;padding:40px;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.25);text-align:center}
.logo{width:110px;margin-bottom:20px}
.version{display:inline-block;background:#4caf50;color:#fff;padding:8px 20px;border-radius:20px;margin:15px 0}
.desc{color:#555;margin:20px 0;line-height:1.8}
.download{display:block;background:#1565c0;color:#fff;text-decoration:none;padding:18px;border-radius:12px;font-size:22px;font-weight:bold}
.download:hover{background:#0d47a1}
.info{text-align:right;margin-top:25px;color:#444}
.info p{margin:8px 0}
.footer{margin-top:25px;color:#888}
</style>
</head>
<body>
<div class="card">
<img src="icon-512.png" class="logo" alt="ELAMAR">
<h1>ELAMAR ERP</h1>
<div class="version" id="version">جاري التحقق...</div>
<p class="desc">منصة إدارة المعدات لشركة العمار.</p>
<a href="#" id="downloadBtn" class="download">⬇ تحميل أحدث إصدار</a>
<div class="info">
<p>✔ Windows 10 / 11</p>
<p>✔ يتم جلب أحدث إصدار تلقائياً من GitHub</p>
<p id="updated"></p>
</div>
<div class="footer">© 2026 ELAMAR ERP</div>
</div>
<script>
const owner="mohamed-shemis";
const repo="elamar-app";
async function init(){
 try{
  const r=await fetch(`https://api.github.com/repos/${owner}/${repo}/releases/latest`);
  const rel=await r.json();
  document.getElementById("version").textContent=rel.tag_name;
  document.getElementById("updated").textContent="آخر تحديث: "+new Date(rel.published_at).toLocaleDateString('ar-EG');
  const exe=rel.assets.find(a=>a.name.toLowerCase().endsWith(".exe"));
  if(exe){
    document.getElementById("downloadBtn").href=exe.browser_download_url;
  }else{
    document.getElementById("downloadBtn").textContent="لا يوجد ملف EXE";
  }
 }catch(e){
  document.getElementById("version").textContent="تعذر الاتصال بـ GitHub";
 }
}
init();
</script>
</body></html>
