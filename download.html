<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ELAMAR ERP | Download</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{

background:linear-gradient(135deg,#0d47a1,#1565c0,#1e88e5);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

}

.card{

width:520px;

max-width:100%;

background:white;

border-radius:20px;

padding:40px;

text-align:center;

box-shadow:0 20px 60px rgba(0,0,0,.25);

}

.logo{

width:120px;

margin-bottom:20px;

}

h1{

font-size:38px;

color:#1565c0;

margin-bottom:10px;

}

.version{

display:inline-block;

background:#4CAF50;

color:white;

padding:8px 22px;

border-radius:30px;

margin:15px;

font-size:16px;

font-weight:bold;

}

.desc{

color:#666;

line-height:30px;

margin-bottom:35px;

font-size:18px;

}

.download{

display:block;

width:100%;

padding:18px;

font-size:22px;

background:#1565c0;

color:white;

text-decoration:none;

border-radius:12px;

transition:.3s;

font-weight:bold;

box-shadow:0 10px 25px rgba(0,0,0,.15);

}

.download:hover{

background:#0d47a1;

transform:translateY(-3px);

}

.info{

margin-top:30px;

text-align:right;

}

.info p{

margin:10px 0;

color:#444;

}

.footer{

margin-top:25px;

font-size:13px;

color:#999;

}

.loading{

margin-top:20px;

color:#1565c0;

font-weight:bold;

}

</style>

</head>

<body>

<div class="card">

<img src="icon-512.png" class="logo" alt="ELAMAR Logo">

<h1>ELAMAR ERP</h1>

<div class="version" id="version">
Loading...
</div>

<p class="desc">
منصة إدارة المعدات لشركة العمار.
</p>

<a id="downloadBtn"
class="download"
href="#">

⬇ تحميل أحدث إصدار

</a>

<div class="loading" id="status">

جاري البحث عن أحدث إصدار...

</div>

<div class="info">

<p>✔ Windows 10 / 11</p>

<p>✔ تحميل مباشر من GitHub Releases</p>

<p>✔ يتم تحديث الإصدار تلقائياً</p>

<p>✔ يعمل Online & Offline</p>

</div>

<div class="footer">

© 2026 ELAMAR ERP

</div>

</div>

<script>

const owner="mohamed-shemis";
const repo="elamar-app";

async function loadRelease(){

try{

const response=await fetch(
`https://api.github.com/repos/${owner}/${repo}/releases/latest`
);

const release=await response.json();

document.getElementById("version").innerHTML=release.tag_name;

document.getElementById("status").innerHTML=
"آخر تحديث : "+
new Date(release.published_at).toLocaleDateString("ar-EG");

const exe=release.assets.find(a=>a.name.toLowerCase().endsWith(".exe"));

if(exe){

document.getElementById("downloadBtn").href=exe.browser_download_url;

}else{

document.getElementById("downloadBtn").innerHTML="لا يوجد ملف EXE";

}

}catch(e){

document.getElementById("status").innerHTML="تعذر الاتصال بـ GitHub";

}

}

loadRelease();

</script>

</body>
</html>
