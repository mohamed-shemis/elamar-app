<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ELAMAR ERP | Download</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:linear-gradient(135deg,#0d47a1,#1976d2,#42a5f5);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
width:520px;
max-width:100%;
background:#fff;
border-radius:22px;
padding:40px;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,.25);
}

.logo{
width:120px;
margin-bottom:20px;
}

h1{
font-size:38px;
color:#1565c0;
margin-bottom:10px;
}

.version{
display:inline-block;
background:#4CAF50;
color:#fff;
padding:8px 22px;
border-radius:30px;
font-size:15px;
margin:20px 0;
}

.desc{
font-size:18px;
color:#555;
line-height:32px;
margin-bottom:25px;
}

.download{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
width:100%;
padding:20px;
background:#ff9800;
color:#fff;
text-decoration:none;
font-size:24px;
font-weight:bold;
border-radius:12px;
transition:.3s;
}

.download:hover{
background:#f57c00;
transform:translateY(-3px);
}

.info{
margin-top:35px;
text-align:right;
}

.info p{
margin:10px 0;
font-size:16px;
color:#444;
}

.footer{
margin-top:30px;
font-size:14px;
color:#888;
}

.loading{
color:#1565c0;
font-weight:bold;
margin-top:15px;
}

</style>

</head>

<body>

<div class="card">

<img src="icon-512.png" class="logo">

<h1>ELAMAR ERP</h1>

<div class="version" id="version">
Loading...
</div>

<p class="desc">
منصة إدارة المعدات لشركة العمار
</p>

<a id="downloadBtn" class="download" href="#">
⬇ تحميل أحدث إصدار
</a>

<div class="loading" id="status">
جارٍ البحث عن أحدث إصدار...
</div>

<div class="info">

<p>✔ Windows 10 / Windows 11</p>

<p>✔ Online & Offline</p>

<p>✔ تحديثات تلقائية من GitHub Releases</p>

<p>✔ تحميل آخر إصدار دائماً</p>

</div>

<div class="footer">
© 2026 ELAMAR ERP
</div>

</div>

<script>

async function loadLatestRelease(){

const owner="mohamed-shemis";
const repo="elamar-app";

try{

const response=await fetch(
`https://api.github.com/repos/${owner}/${repo}/releases/latest`
);

const release=await response.json();

document.getElementById("version").innerHTML=release.tag_name;

const exe=release.assets.find(asset=>
asset.name.toLowerCase().endsWith(".exe")
);

if(exe){

document.getElementById("downloadBtn").href=
exe.browser_download_url;

document.getElementById("downloadBtn").target="_blank";

document.getElementById("status").innerHTML=
"جاهز للتحميل ✔";

}else{

document.getElementById("status").innerHTML=
"لم يتم العثور على ملف EXE";

document.getElementById("downloadBtn").style.display="none";

}

}catch(e){

document.getElementById("status").innerHTML=
"حدث خطأ أثناء الاتصال بـ GitHub";

console.log(e);

}

}

loadLatestRelease();

</script>

</body>
</html>
