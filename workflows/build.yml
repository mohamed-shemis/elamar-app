name: Build ELAMAR

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Build Windows App
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.${{ github.run_number }}
          name: ELAMAR v1.${{ github.run_number }}
          generate_release_notes: true
          make_latest: true
          files: |
            dist/*.exe
          body: |
            ## ⬇️ Download ELAMAR ERP

            اضغط على ملف EXE الموجود بالأسفل لتحميل البرنامج.

            Click the EXE file below to download the latest version.

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
